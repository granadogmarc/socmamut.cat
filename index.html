<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mamut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- =============================================
       SECTION 1: HERO
       Dark teal background, centered logo.
  ============================================= -->
  <section id="hero" class="section bg-dark">
    <div class="center-content">
      <img
        src="images/web/logo_mamut.png"
        alt="mamut"
        class="logo-img"
      >
    </div>
    <div class="scroll-cue" aria-hidden="true">↓</div>
  </section>

  <!-- =============================================
       SECTION 2: ABOUT
       Terracotta background. Band photo strip on top,
       then mammoth icon + tagline below.
  ============================================= -->
  <section id="about" class="section bg-terracotta">
    <div class="center-content fade-in">
      <img
        src="images/web/isotip_mamut.png"
        alt="mamut"
        class="mammoth-icon"
      >
      <p class="tagline">Som un grup bastant fràgil i absurd que intentem anar fent música superpop amb un mode animal per no caure a l'abisme 🦣</p>
    </div>
  </section>

  <!-- =============================================
       SECTION 3: MUSIC / SPOTIFY
       Dark background. Spotify embed + band photo below.
       Replace YOUR_ARTIST_ID with mamut's Spotify artist ID.
       You can find it by going to mamut's Spotify page,
       clicking "..." → "Share" → "Copy link to artist".
       The ID is the string after /artist/ in the URL.
  ============================================= -->
  <section id="music" class="section bg-dark">
    <div class="music-content">
      <div class="music-overlay"></div>
      <img
        src="images/web/MAMUT_FINALS_09_wide.jpg"
        alt="mamut band photo"
        class="music-photo"
        loading="lazy"
      >
      <iframe
        id="spotify-embed"
        src="https://open.spotify.com/embed/artist/3Cp3qzWZEUm2MSXGfXx1D2?utm_source=generator&theme=0"
        width="100%"
        height="80"
        frameborder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>
    </div>
  </section>

  <!-- =============================================
       SECTION 4: STREAMING LINKS
       Cream background. Links to music platforms.
       Replace the # in href with the actual URLs
       for mamut's Audiomack and Apple Music pages.
  ============================================= -->
  <section id="streaming" class="section bg-cream">
    <div class="center-content fade-in">
      <p class="tagline dark-text">aquí hi ha la nostra música</p>
      <div class="platform-links">

        <a href="https://open.spotify.com/artist/3Cp3qzWZEUm2MSXGfXx1D2" target="_blank" rel="noopener" class="platform-btn" aria-label="Spotify">
          <!-- Spotify icon -->
          <svg viewBox="0 0 24 24" class="platform-icon" fill="currentColor">
            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
          </svg>
        </a>

<a href="https://music.apple.com/es/artist/mamut/1797336071" target="_blank" rel="noopener" class="platform-btn" aria-label="Apple Music">
          <!-- Apple logo -->
          <svg viewBox="0 0 24 24" class="platform-icon" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
        </a>

        <a href="https://www.deezer.com/fr/artist/381913771" target="_blank" rel="noopener" class="platform-btn" aria-label="Deezer">
          <!-- Deezer icon -->
          <svg viewBox="0 0 24 20" class="platform-icon" fill="currentColor">
            <rect x="0"  y="12" width="4" height="8"  rx="0.5"/>
            <rect x="5"  y="8"  width="4" height="12" rx="0.5"/>
            <rect x="10" y="4"  width="4" height="16" rx="0.5"/>
            <rect x="15" y="8"  width="4" height="12" rx="0.5"/>
            <rect x="20" y="0"  width="4" height="20" rx="0.5"/>
          </svg>
        </a>

        <!-- Replace # with mamut's YouTube channel URL -->
        <a href="#" target="_blank" rel="noopener" class="platform-btn" aria-label="YouTube de mamut">
          <!-- YouTube icon -->
          <svg viewBox="0 0 24 24" class="platform-icon" fill="currentColor">
            <path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.2c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.3v2c0 2.1.3 4.3.3 4.3s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.5 21.8 12 21.8 12 21.8s4.2 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.3v-2C23.3 9.1 23 7 23 7zM9.7 15.5V8.2l6.6 3.7-6.6 3.6z"/>
          </svg>
        </a>

      </div>
    </div>
  </section>

  <!-- =============================================
       SECTION 5: SOCIAL
       Dark background. Instagram link.
       Replace the # in href with mamut's Instagram URL,
       e.g. href="https://www.instagram.com/mamutband"
  ============================================= -->
  <section id="social" class="section bg-dark">
    <div class="center-content fade-in">
      <p class="tagline">aquí ens pots trobar a nosaltres</p>
      <a href="https://www.instagram.com/soc.mamut" target="_blank" rel="noopener" class="social-link" aria-label="Instagram de mamut">
        <!-- Instagram icon -->
        <svg viewBox="0 0 24 24" class="social-icon" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
    <div class="terracotta-stripe"></div>
  </section>

  <!-- =============================================
       SECTION 6: CONTACT
       Terracotta background. Email contact.
       Replace the email address in href with mamut's
       real booking/contact email.
  ============================================= -->
  <section id="contact" class="section bg-terracotta">
    <div class="center-content fade-in">
      <p class="tagline">i si ens vols contactar per que vinguem a tocar,<br>és aquí</p>
      <a href="mailto:soc.mamut@gmail.com" class="contact-link" aria-label="Contacta mamut per email">
        <!-- Envelope icon -->
        <svg viewBox="0 0 48 36" class="contact-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="46" height="34" rx="3"/>
          <polyline points="1,1 24,20 47,1"/>
        </svg>
      </a>
    </div>
  </section>

  <!-- =============================================
       SECTION 7: FAREWELL
       Full-bleed photo with "Ens veiem aviat!" overlay.
  ============================================= -->
  <section id="farewell" class="section bg-dark">
    <div class="farewell-content">
      <img
        src="images/web/marc_marti2.jpg"
        alt="mamut"
        class="farewell-photo"
        loading="lazy"
      >
      <div class="farewell-overlay"></div>
      <div class="farewell-text fade-in">
        <p class="tagline">Ens veiem aviat!</p>
      </div>
    </div>
  </section>

  <script>
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      }),
      { threshold: 0.15 }
    );
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>

</body>
</html>
